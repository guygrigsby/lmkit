name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: gofmt
        run: test -z "$(gofmt -l cmd internal)" || (gofmt -l cmd internal; exit 1)
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
