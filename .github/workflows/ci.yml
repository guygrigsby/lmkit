name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: gofmt
        run: test -z "$(gofmt -l cmd internal)" || (gofmt -l cmd internal; exit 1)
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # CPU torch: the default Linux wheel is the multi-GB CUDA build we don't need.
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -e ".[dev]"
      - run: pytest tests/                                   # core + README drift guard
      - run: PYTHONPATH=. pytest examples/llama/test_smoke.py  # the example model, CPU
